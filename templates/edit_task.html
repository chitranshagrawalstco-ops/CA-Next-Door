{% extends "base.html" %}
{% block content %}

<div class="card">

<h2>Edit Task</h2>

<form method="POST">

<input name="task" value="{{ task[0] }}" required>

<input type="date"
       name="task_date"
       value="{{ task[1] }}"
       required>

<button>Update Task</button>

</form>

</div>

{% endblock %}
