{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Study Hours Tracker</h2>

    <form method="POST">
        <input type="date" name="study_date" required>
        <input type="number" step="0.5" name="hours" placeholder="Hours" required>
        <button>Add / Update</button>
    </form>

</div>

<div class="card">

<canvas id="hoursChart"></canvas>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('hoursChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ dates | tojson }},
        datasets: [{
            label: 'Study Hours',
            data: {{ hours_list | tojson }},
            tension: 0.3,
            fill: false
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: true }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

{% endblock %}
