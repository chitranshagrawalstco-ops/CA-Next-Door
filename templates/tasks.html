{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Task Planner</h2>
    <p class="page-subtext">Plan and track daily tasks efficiently.</p>

    <form method="POST">
        <label>Task</label>
        <input name="task" placeholder="Enter Task" required>
        <label>Date</label>
        <input type="date" name="task_date" required>
        <button>Add Task</button>
    </form>

</div>

<div class="card">

<h3>All Tasks</h3>

<table class="table">

<thead>
<tr class="progress-header">
<th>Task</th>
<th>Date</th>
<th>Action</th>
<th>Done</th>
</tr>
</thead>
<tbody>

{% for t in tasks %}
<tr>
<td>{{ t[1] }}</td>
<td>{{ t[2] }}</td>

<td>
<a href="/tasks/edit/{{ t[0] }}">Edit</a>
|
<a href="/tasks/delete/{{ t[0] }}">Delete</a>
</td>
<td class="left">
<a href="/tasks/toggle/{{ t[0] }}">
{{ "✅" if t[3]==1 else "⬜" }}
</a>
</td>

</tr>
{% endfor %}

</tbody>
</table>

</div>

{% endblock %}
