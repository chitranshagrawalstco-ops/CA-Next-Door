{% extends "base.html" %}
{% block content %}

<div class="card">
<h2>Edit Milestone</h2>

<form method="POST">
<label>Subject</label>
<select name="subject_id" required>
{% for s in subjects %}
<option value="{{ s[0] }}" {% if s[0] == goal[1] %}selected{% endif %}>{{ s[1] }}</option>
{% endfor %}
</select>

<label>Goal Title</label>
<input name="goal_title" value="{{ goal[2] }}" required>

<label>Target Completion Date</label>
<input name="target_date" type="date" value="{{ goal[3] }}" required>

<label>Target Completion (%)</label>
<input name="target_percent" type="number" min="1" max="100" step="0.1" value="{{ goal[4] }}" required>

<label>Notes (optional)</label>
<input name="notes" value="{{ goal[5] or '' }}">

<button>Update Milestone</button>
</form>
</div>

{% endblock %}
