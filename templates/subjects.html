{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Subjects</h2>
    <p class="page-subtext">Add and manage your subjects in one place.</p>

    <form method="POST">
        <label>Subject Name</label>
        <input type="text" name="subject" placeholder="Enter Subject" required>
        <button type="submit">Add Subject</button>
    </form>
</div>

<div class="card">
    <h3>Your Subjects</h3>

    <table class="table">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for s in subjects %}
            <tr>
                <td><a href="/subjects/{{ s[0] }}/chapters">{{ s[1] }}</a></td>
                <td class="subjects-action-cell">
                    <a href="/subjects/edit/{{ s[0] }}">Edit</a>
                    |
                    <a href="/subjects/delete/{{ s[0] }}">Delete</a>
                </td>
            </tr>
        {% else %}
            <tr>
                <td colspan="2">No subjects added yet.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
